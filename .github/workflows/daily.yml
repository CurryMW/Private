name: Daily DingTalk Digest

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Print a preview without sending or saving state
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: dingtalk-ai-daily
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      AI_BASE_URL: https://apiclaude.cc/v1
      AI_MODEL: claude-sonnet-4-6
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: .state
          key: dingtalk-ai-state-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: dingtalk-ai-state-${{ runner.os }}-
      - run: python -m ai_daily.cli
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_ACCESS_TOKEN: ${{ secrets.DINGTALK_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
      - uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5
        if: "success() && !(github.event_name == 'workflow_dispatch' && inputs.dry_run)"
        with:
          path: .state
          key: dingtalk-ai-state-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
